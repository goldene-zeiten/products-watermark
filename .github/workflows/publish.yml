name: publish
on:
  push:
    tags:
      - '*'

jobs:
  publish:
    name: Ensure GitHub Release with extension TER artifact and publishing to TER
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag
        run: |
          if ! [[ ${{ github.ref }} =~ ^refs/tags/[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}$ ]]; then
            echo "ERR: Invalid publish version tag: ${{ github.ref }}"
            exit 1
          fi

      - name: Get version
        id: get-version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Get extension key
        id: get-extension-key
        run: |
          echo "DETECTED_EXTENSION_KEY=$(cat composer.json | jq -r '.extra."typo3/cms"."extension-key"' )" >> "$GITHUB_ENV"

      - name: Get comment
        id: get-comment
        run: |
          {
            echo 'terReleaseNotes<<EOF'
            echo "https://github.com/${{ github.repository }}/releases/tag/${{ env.version }}"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor --prefer-dist --no-progress --no-suggest

      # Extensions that require third-party Composer libraries must ship them for TYPO3 Classic mode, where
      # Composer does not resolve dependencies. The libraries are vendored into the path each extension
      # declares in `extra.typo3/cms.Package.providesPackages` (from where TYPO3 loads their autoload.php) -
      # built here, into the artifact only, never committed. A no-op for extensions that provide nothing.
      - name: Bundle third-party libraries for TYPO3 Classic mode
        run: |
          jq -r '.extra."typo3/cms".Package.providesPackages // {} | to_entries[] | [.key, .value] | @tsv' composer.json |
          while IFS=$'\t' read -r package path; do
            [ -z "$package" ] && continue
            constraint=$(jq -r --arg p "$package" '.require[$p] // "*"' composer.json)
            echo "Bundling ${package} (${constraint}) into ${path}"
            workdir="$(mktemp -d)"
            composer --working-dir="$workdir" require "${package}:${constraint}" \
              --no-interaction --no-progress --optimize-autoloader --no-dev
            mkdir -p "$path"
            cp -a "$workdir/vendor/." "$path/"
          done

      # Note that step will fail when `env.version` does not match the `ext_emconf.php` version.
      - name: Create local TER package upload artifact
        run: |
          php ~/.composer/vendor/bin/tailor create-artefact ${{ env.version }}

      # Note that when release already exists for tag, only files will be uploaded and lets this acting as a
      # fallback to ensure that a real GitHub release is created for the tag along with extension artifacts.
      - name: Create release and upload artifacts in the same step
        uses: softprops/action-gh-release@v2
        if: ${{startsWith(github.ref, 'refs/tags/') }}
        with:
          name: "[RELEASE] ${{ env.version }}"
          generate_release_notes: true
          files: |
            tailor-version-artefact/${{ env.DETECTED_EXTENSION_KEY }}_${{ env.version }}.zip
            LICENSE
          fail_on_unmatched_files: true

      - name: Publish to TER
        run: |
          php ~/.composer/vendor/bin/tailor ter:publish --comment "${{ env.terReleaseNotes }}" ${{ env.version }} \
            --artefact=tailor-version-artefact/${{ env.DETECTED_EXTENSION_KEY }}_${{ env.version }}.zip
